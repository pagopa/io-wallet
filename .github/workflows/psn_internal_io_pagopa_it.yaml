name: psn.internal.io.pagopa.it TLS Certificate Renewal

on:
  schedule:
    - cron: '0 3 * * 1,3'
  workflow_dispatch:
  push:
    branches:
      - tls-renewal

permissions:
  id-token: write

env:
  KEY_VAULT_NAME: "iw-p-itn-cdn-kv-01"
  # KEY_VAULT_SUBSCRIPTION_ID: "725dede2-879b-45c5-82fa-eb816875b10c"
  # KEY_VAULT_TENANT_ID: "bda10453-bf8a-4af5-99ce-b3ac5093001b"
  CSR_COMMON_NAME: "appgw.psn.test.com"
  DNS_ZONE: "psn.test.com"
  DNS_ZONE_RESOURCE_GROUP: "io-infra-rg"

jobs:
  get-existing-certificate:
    name: Get Existing Certificate
    runs-on: 'psn'
    environment: infra-prod-cd
    env:
      ARM_PSN_CLIENT_ID: ${{ secrets.ARM_PSN_CLIENT_ID }}
      ARM_PSN_SUBSCRIPTION_ID: ${{ secrets.ARM_PSN_SUBSCRIPTION_ID}}
      ARM_PSN_TENANT_ID: ${{ secrets.ARM_PSN_TENANT_ID}}
    outputs:
      renew_certificate: ${{ steps.should_renew.outputs.renew_certificate }}

    steps:
      - name: Azure Login (PSN)
        uses: azure/login@6b2456866fc08b011acb422a92a4aa20e2c4de32 # v2.1.0
        with:
          client-id: ${{ env.ARM_PSN_CLIENT_ID }}
          tenant-id: ${{ env.ARM_PSN_TENANT_ID }}
          subscription-id: ${{ env.ARM_PSN_SUBSCRIPTION_ID }}

      - name: Fetch and check certificate
        id: fetch_and_check
        env:
          CERT_NAME: ${{ env.CSR_COMMON_NAME }}
        run: |
            key_vault_cert_name=$(echo "${CERT_NAME//./-}")

            if ! az keyvault certificate download --vault-name "$KEY_VAULT_NAME" -n "$key_vault_cert_name" -f certificate.pem >/dev/null
              then
                echo "❌ The certificate was not found in the selected Key Vault, proceeding to request it from LE"
                echo "require_new_certificate=true" >> $GITHUB_OUTPUT
            else
              if ! openssl x509 -inform pem -checkend "$certificate_expiration_time" -noout -in certificate.pem
                then
                  # certificate is expiring or is already expired
                  echo "require_new_certificate=true" >> $GITHUB_OUTPUT
                else
                  echo "✅ The certificate is not expiring, cleaning up and exiting"
              fi
              rm -f certificate.pem
            fi

      - name: Set renew_certificate
        id: should_renew
        env:
          REQUIRE_NEW_CERT: ${{ steps.fetch_and_check.outputs.require_new_certificate }}
        run: |
          if [[ "$REQUIRE_NEW_CERT" == "true" ]]; then
            echo "renew_certificate=true" >> $GITHUB_OUTPUT
            echo "## 🔑 Renewal Status: REQUIRED" >> $GITHUB_STEP_SUMMARY
            echo "**Verification successful.** The certificate will be renewed in the next step. ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "renew_certificate=false" >> $GITHUB_OUTPUT
            echo "## ✅ Renewal Status: NOT NEEDED" >> $GITHUB_STEP_SUMMARY
            echo "No certificate renewal is required at this time. 🟢" >> $GITHUB_STEP_SUMMARY
          fi

  renew-certificate:
    name: Renew Certificate
    needs: get-existing-certificate
    if: needs.get-existing-certificate.outputs.renew_certificate == 'true'
    runs-on: 'io'
    environment: infra-prod-cd
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID}}
      ARM_PSN_CLIENT_ID: ${{ secrets.ARM_PSN_CLIENT_ID }}
      ARM_PSN_SUBSCRIPTION_ID: ${{ secrets.ARM_PSN_SUBSCRIPTION_ID }}
      ARM_PSN_TENANT_ID: ${{ secrets.ARM_PSN_TENANT_ID}}
      LE_PRIVATE_KEY_JSON: ${{ secrets.LE_PRIVATE_KEY_JSON }}
      LE_REGR_JSON: ${{ secrets.LE_REGR_JSON }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@main

      # - name: Azure Login (PSN)
      #   uses: azure/login@6b2456866fc08b011acb422a92a4aa20e2c4de32 # v2.1.0
      #   with:
      #     client-id: ${{ env.ARM_PSN_CLIENT_ID }}
      #     tenant-id: ${{ env.ARM_PSN_TENANT_ID }}
      #     subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      # - name: Fetch LE keys from Key Vault
      #   env:
      #     KEY_VAULT_NAME: ${{ env.KEY_VAULT_NAME }}
      #   run: |
      #       az keyvault secret download --vault-name "$KEY_VAULT_NAME" --name le-private-key-json --file private_key.json
      #       az keyvault secret download --vault-name "$KEY_VAULT_NAME" --name le-regr-json --file regr.json

      - name: Set LE Files
        working-directory: ./.github/workflows
        run: |
          echo '${{ env.LE_PRIVATE_KEY_JSON }}' > private_key.json
          echo '${{ env.LE_REGR_JSON }}' > regr.json

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12.8"

      - name: Setup Python requirements
        shell: bash
        working-directory: ./.github/workflows
        run: |
          pip3 install \
            --require-hashes \
            --requirement "./le_renew_ssl_certificate_python_requirements.txt"

      - name: Generate the CSR
        shell: bash
        working-directory: ./.github/workflows
        run: |
          python3 "./le_renew_ssl_certificate_generate_csr.py" \
            --common-name "$CSR_COMMON_NAME" \
            --out csr.der \
            --rsa-key-size 2048

      - name: Azure Login (IO)
        uses: azure/login@6b2456866fc08b011acb422a92a4aa20e2c4de32 # v2.1.0
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Request for a New Certificate from LE
        shell: bash
        env:
          AZURE_DNS_ZONE_RESOURCE_GROUP: ${{ env.DNS_ZONE_RESOURCE_GROUP }}
          AZURE_SUBSCRIPTION_ID: ${{ env.ARM_SUBSCRIPTION_ID }}
          AZURE_PRIVATE_DNS_ZONE: ${{ env.DNS_ZONE }}
          AZURE_IDENTITY_TYPE: "MANAGED_IDENTITY"
        working-directory: ./.github/workflows
        run: |
          python3 "./le_renew_ssl_certificate_acme_tiny.py" \
            --private-key private_key.json \
            --regr regr.json \
            --csr csr.der \
            --out certificate_chain.pem

      - name: Azure Login (PSN)
        uses: azure/login@6b2456866fc08b011acb422a92a4aa20e2c4de32 # v2.1.0
        with:
          client-id: ${{ env.ARM_PSN_CLIENT_ID }}
          tenant-id: ${{ env.ARM_PSN_TENANT_ID }}
          subscription-id: ${{ env.ARM_PSN_SUBSCRIPTION_ID }}

      - name: Save the certificate in Key Vault
        env:
          CERT_NAME: ${{ env.CSR_COMMON_NAME }}
        run: |
            key_vault_cert_name=$(echo "${CERT_NAME//./-}")
            openssl pkcs12 -inkey csr.key -in certificate_chain.pem -export -passout pass: -nodes -out certificate_chain.pfx

            az keyvault certificate import \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$key_vault_cert_name" \
              --disabled false \
              -f certificate_chain.pfx \
              --password "" >/dev/null

      - name: Cleanup the Workspace
        if: always()
        run: |
          rm -f *.pem* *.json *.der *.key *.pfx
